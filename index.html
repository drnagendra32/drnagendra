<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Clinic</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            margin-left: 40px;
            margin-right: 40px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        .title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .gallery-item:hover .title {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Clinic</h1>
        <section class="gallery">
            <div class="gallery-item">
                <img src="https://raw.githubusercontent.com/user/repo/branch/image1.jpg" alt="Clinic Image 1">
                <div class="title">क्लिनिक की तस्वीर</div>
            </div>
            <div class="gallery-item">
                <img src="https://raw.githubusercontent.com/user/repo/branch/image2.jpg" alt="Clinic Image 2">
                <div class="title">क्लिनिक का दृश्य</div>
            </div>
            <div class="gallery-item">
                <img src="https://raw.githubusercontent.com/user/repo/branch/image3.jpg" alt="Equipment">
                <div class="title">उपकरण</div>
            </div>
            <div class="gallery-item">
                <img src="https://raw.githubusercontent.com/user/repo/branch/image4.jpg" alt="Clinic Interior">
                <div class="title">क्लिनिक इंटीरियर</div>
            </div>
            <div class="gallery-item">
                <img src="https://raw.githubusercontent.com/user/repo/branch/image5.jpg" alt="Operation Room">
                <div class="title">ऑपरेशन रूम</div>
            </div>
            <div class="gallery-item">
                <img src="https://raw.githubusercontent.com/user/repo/branch/image6.jpg" alt="Patient Area">
                <div class="title">रोगी क्षेत्र</div>
            </div>
        </section>
    </div>
</body>
</html>
